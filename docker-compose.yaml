name: tai-stack

services:
  ollama:
    image: ollama/ollama:0.32.1
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment the block below to enable GPU on Linux with Nvidia hardware.
    # This requires installing the NVIDIA Container Toolkit.
    # Note: Docker on Apple Silicon cannot access the GPU.
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:0.32.1
    container_name: ollama-init
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2 && ollama pull nomic-embed-text"]
    depends_on:
      ollama:
        condition: service_healthy

  litellm:
    image: ghcr.io/berriai/litellm:v1.92.0
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=sk-local
    depends_on:
      - ollama

  anythingllm:
    image: mintplexlabs/anythingllm:1.15.0
    container_name: anythingllm
    ports:
      - "3001:3001"
    volumes:
      - anythingllm-data:/app/server/storage
    environment:
      - LLM_PROVIDER=litellm
      - LITE_LLM_MODEL_PREF=llama3.2
      - LITE_LLM_API_KEY=sk-local
      - LITE_LLM_BASE_PATH=http://litellm:4000
      - STORAGE_DIR=/app/server/storage
      # There is a known bug in the LiteLLM -> Ollama pipleine where tool calls come back
      # as raw JSON text instead of structured `tool_calls` fields
      - PROVIDER_DISABLE_NATIVE_TOOL_CALLING=litellm
    depends_on:
      - litellm

networks:
  ai-net:
    driver: bridge

volumes:
  ollama-data:
  anythingllm-data:
